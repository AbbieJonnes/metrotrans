<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetroPass QR Ticket</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- QR CODE LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
</head>

<body class="bg-blue-50 flex items-center justify-center min-h-screen">

  <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl text-center">

    <h1 class="text-2xl font-bold mb-4 text-slate-800">
      Your MetroPass Ticket
    </h1>

    <p class="text-gray-600 mb-6">
      Show this QR code to the conductor
    </p>

    <!-- QR CODE BOX -->
    <div id="qrcode" class="flex justify-center mb-6"></div>

    <!-- Passenger Info -->
    <div id="info" class="text-left text-sm text-gray-700 space-y-2"></div>

    <button
      onclick="goHome()"
      class="w-full mt-6 bg-blue-700 text-white py-3 rounded-xl hover:bg-blue-800"
    >
      Back to Home
    </button>

  </div>

  <script>
    const passenger = JSON.parse(localStorage.getItem("passenger"));

    if (!passenger) {
      alert("No passenger data found!");
      window.location.href = "register.html";
    }

    // Generate QR Code data
    const qrData = `
Name: ${passenger.name}
Phone: ${passenger.phone}
Route: ${passenger.route}
Plan: ${passenger.plan}
Expiry: ${passenger.expiry}
    `;

    // Create QR code
    new QRCode(document.getElementById("qrcode"), {
      text: qrData,
      width: 200,
      height: 200
    });

    // Show passenger details
    document.getElementById("info").innerHTML = `
      <p><strong>Name:</strong> ${passenger.name}</p>
      <p><strong>Route:</strong> ${passenger.route}</p>
      <p><strong>Plan:</strong> ${passenger.plan}</p>
      <p><strong>Expiry:</strong> ${passenger.expiry}</p>
    `;

    function goHome() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetroPass QR Ticket</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 flex items-center justify-center min-h-screen">

  <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl text-center">

    <h1 class="text-2xl font-bold mb-4 text-slate-800">
      Your MetroPass Ticket
    </h1>

    <p class="text-gray-600 mb-6">
      Show this ticket to the conductor
    </p>

    <!-- STATIC QR IMAGE -->
    <div class="flex justify-center mb-6">
      <img
        src="assets/images/scan.jpg"
        alt="QR Code"
        class="w-48 h-48"
      >
    </div>

    <!-- STATIC INFO -->
    <div class="text-left text-sm text-gray-700 space-y-2 bg-gray-100 p-4 rounded-xl">

      <p><strong>Name:</strong> Passenger Name</p>
      <p><strong>Route:</strong> Nairobi - Westlands</p>
      <p><strong>Plan:</strong> Weekly / Monthly</p>
      <p><strong>Expiry:</strong> 30 May 2026</p>

    </div>

    <!-- BACK BUTTON -->
    <a
      href="index.html"
      class="block w-full mt-6 bg-blue-700 text-white py-3 rounded-xl hover:bg-blue-800"
    >
      Back to Home
    </a>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MetroPass Registration</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 min-h-screen flex items-center justify-center px-4">

  <!-- Registration Card -->
  <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl">

    <h1 class="text-3xl font-bold text-center text-slate-800 mb-2">
      Passenger Registration
    </h1>

    <p class="text-gray-500 text-center mb-8">
      Subscribe weekly or monthly for your transport pass.
    </p>

    <!-- FORM (STATIC ONLY - NO JS) -->
    <form class="space-y-5">

      <!-- Full Name -->
      <div>
        <label class="block mb-2 font-medium text-slate-700">
          Full Name
        </label>

        <input
          type="text"
          placeholder="Enter your full name"
          class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >
      </div>

      <!-- Phone Number -->
      <div>
        <label class="block mb-2 font-medium text-slate-700">
          Phone Number
        </label>

        <input
          type="tel"
          placeholder="e.g 0712345678"
          class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >
      </div>

      <!-- Route -->
      <div>
        <label class="block mb-2 font-medium text-slate-700">
          Route
        </label>

        <input
          type="text"
          placeholder="e.g Nairobi - Thika"
          class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >
      </div>

      <!-- Subscription Plan -->
      <div>
        <label class="block mb-2 font-medium text-slate-700">
          Subscription Plan
        </label>

        <select
          class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option>Weekly</option>
          <option>Monthly</option>
        </select>
      </div>

      <!-- BUTTON -->
      <a
        href="payment.html"
        class="block w-full text-center bg-blue-700 hover:bg-blue-800 text-white py-3 rounded-xl transition"
      >
        Continue to Payment
      </a>

    </form>

  </div>

</body>
</html>

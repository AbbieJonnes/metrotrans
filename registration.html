<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>MetroPass - Register</title>
</head>

<body class="bg-blue-50 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">
    <h1 class="text-2xl font-bold text-center mb-6">MetroPass Registration</h1>

    <input id="name" type="text" placeholder="Full Name"
      class="w-full mb-3 p-2 border rounded">

    <input id="phone" type="text" placeholder="Phone Number"
      class="w-full mb-3 p-2 border rounded">

    <input id="route" type="text" placeholder="Route (e.g Nairobi-Thika)"
      class="w-full mb-3 p-2 border rounded">

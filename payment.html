<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetroPass Payment</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 flex items-center justify-center h-screen">

  <!-- MAIN CARD -->
  <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl text-center">

    <h1 class="text-2xl font-bold mb-4">
      Payment Instructions
    </h1>

    <p class="text-gray-600 mb-4">
      MetroPass Subscription Payment
    </p>

    <!-- STATIC PRICES -->
    <div class="text-left bg-gray-100 p-4 rounded-xl mb-6">

      <p class="mb-2">
        <span class="font-semibold">Weekly Plan:</span> KES 500
      </p>

      <p>
        <span class="font-semibold">Monthly Plan:</span> KES 2000
      </p>

    </div>

    <!-- INSTRUCTIONS -->
    <p class="text-gray-600 mb-6">
      To complete payment, dial <b>*234#</b> and follow M-Pesa instructions.
    </p>

    <!-- LINK TO NEXT PAGE -->
    <a
      href="qr.html"
      class="block w-full bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition"
    >
      I Have Paid
    </a>

  </div>

</body>
</html>
